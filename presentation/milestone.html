<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节点详情 - AI 小镇与多智能体社会模拟发展脉络</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f7ff',
              100: '#ebf0ff',
              200: '#d6e0ff',
              300: '#adc2ff',
              400: '#85a3ff',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            },
            phase1: '#3b82f6',
            phase2: '#10b981',
            phase3: '#8b5cf6',
            phase4: '#f59e0b',
          }
        }
      }
    }
  </script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
    }
    .gradient-bg {
      background: radial-gradient(circle at 50% 0%, rgba(30, 58, 138, 0.1) 0%, rgba(15, 23, 42, 0) 50%), #0f172a;
    }
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body class="gradient-bg text-slate-100 min-h-screen selection:bg-brand-500 selection:text-white flex flex-col">

  <!-- Header -->
  <header class="border-b border-slate-800/80 backdrop-blur-md sticky top-0 z-50 bg-slate-950/80">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <a href="index.html" class="inline-flex items-center space-x-2 text-slate-400 hover:text-white transition-colors duration-200">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          <span class="text-sm font-semibold">返回主页</span>
        </a>
        <span class="text-slate-600">|</span>
        <span class="font-extrabold text-lg bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 bg-clip-text text-transparent tracking-tight">
          节点详情
        </span>
      </div>
      <div class="text-sm text-slate-400 font-medium" id="header-node-info">
        <!-- Node number and title -->
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <div class="flex-1 flex max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 gap-8 overflow-hidden">
    
    <!-- Sidebar Navigation (Left) -->
    <aside class="w-80 hidden lg:flex flex-col border border-slate-800/60 bg-slate-950/50 rounded-2xl p-4 overflow-y-auto no-scrollbar max-h-[calc(100vh-8rem)]">
      <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest px-3 mb-4">
        发展轨迹导航 (17)
      </h2>
      <nav class="space-y-1 flex-1" id="sidebar-nav">
        <!-- Dynamically populated by JS -->
      </nav>
    </aside>

    <!-- Content Area (Right) -->
    <main class="flex-1 overflow-y-auto no-scrollbar max-h-[calc(100vh-8rem)] space-y-8" id="main-content">
      
      <!-- Loading state or Dynamic content -->
      <div id="loading-state" class="flex flex-col items-center justify-center py-24 space-y-4">
        <div class="w-12 h-12 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-sm text-slate-400">正在加载节点数据...</p>
      </div>

      <div id="node-content" class="hidden space-y-8">
        <!-- Title & Phase Banner -->
        <div class="bg-slate-900/40 border border-slate-800/80 rounded-3xl p-8 relative overflow-hidden">
          <div class="absolute top-0 right-0 w-64 h-64 bg-brand-500/5 rounded-full blur-3xl -z-10"></div>
          <div class="flex flex-wrap items-center gap-3 mb-4">
            <span class="px-3 py-1 rounded-full text-xs font-bold bg-brand-500/10 text-brand-400 border border-brand-500/20" id="node-phase">
              <!-- Phase -->
            </span>
            <span class="px-3 py-1 rounded-full text-xs font-bold bg-slate-800 text-slate-300 border border-slate-700" id="node-date">
              <!-- Date -->
            </span>
          </div>
          <h1 class="text-3xl sm:text-4xl font-black text-white tracking-tight" id="node-title">
            <!-- Title -->
          </h1>
          <p class="mt-4 text-slate-400 leading-relaxed text-lg border-l-4 border-brand-500 pl-4" id="node-summary">
            <!-- Summary -->
          </p>

          <!-- External Links -->
          <div class="mt-6 flex flex-wrap gap-4 pt-6 border-t border-slate-800/60" id="node-links">
            <!-- Paper and Repo Links -->
          </div>
        </div>

        <!-- Real Screenshot / Architecture Diagram -->
        <div class="bg-slate-900/40 border border-slate-800/80 rounded-3xl p-6 space-y-4">
          <h2 class="text-lg font-bold text-white flex items-center space-x-2">
            <span class="text-brand-400">🖼️</span>
            <span>真实效果截图 / 架构图</span>
          </h2>
          <div class="relative rounded-2xl overflow-hidden border border-slate-800 bg-slate-950 flex items-center justify-center min-h-[300px]">
            <img id="node-image" src="" alt="Screenshot" onerror="this.onerror=null; this.src='images/placeholder.svg';" class="max-h-[500px] object-contain w-full">
          </div>
          <p class="text-xs text-slate-500 text-center italic">
            *以上为项目真实运行效果截图、官方架构图或学术论文配图
          </p>
        </div>

        <!-- Core Architecture & Technical Principles -->
        <div class="space-y-4">
          <h2 class="text-xl font-bold text-white flex items-center space-x-2">
            <span class="text-brand-400">⚙️</span>
            <span>核心架构与技术原理</span>
          </h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="node-architecture">
            <!-- Architecture Cards -->
          </div>
        </div>

        <!-- Key Contributions & Societal Implications -->
        <div class="bg-slate-900/40 border border-slate-800/80 rounded-3xl p-8 space-y-6">
          <h2 class="text-xl font-bold text-white flex items-center space-x-2">
            <span class="text-brand-400">💡</span>
            <span>关键贡献与对社会模拟的启示</span>
          </h2>
          <ul class="space-y-4 text-slate-300" id="node-contributions">
            <!-- Contributions List -->
          </ul>
        </div>

        <!-- Bottom Navigation -->
        <div class="flex items-center justify-between pt-6 border-t border-slate-800/60">
          <a id="prev-node-btn" href="#" class="inline-flex items-center space-x-2 px-4 py-2.5 rounded-xl border border-slate-800 bg-slate-950/50 hover:bg-slate-900 text-sm font-semibold text-slate-300 hover:text-white transition-all duration-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
            </svg>
            <span>上一个节点</span>
          </a>
          <a id="next-node-btn" href="#" class="inline-flex items-center space-x-2 px-4 py-2.5 rounded-xl border border-slate-800 bg-slate-950/50 hover:bg-slate-900 text-sm font-semibold text-slate-300 hover:text-white transition-all duration-200">
            <span>下一个节点</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path>
            </svg>
          </a>
        </div>

      </div>

    </main>

  </div>

  <!-- Load Data -->
  <script src="data.js"></script>
  <script>
    // Map phase names to filter keys
    const phaseMap = {
      "第一阶段：单体与双体协作萌芽": "phase1",
      "第二阶段：群体模拟与经典架构确立": "phase2",
      "第三阶段：垂直领域与社会工程深化": "phase3",
      "第四阶段：大规模模拟与混合自治时代": "phase4"
    };

    const phaseStyles = {
      "phase1": "text-blue-400 bg-blue-500/10 border-blue-500/20",
      "phase2": "text-emerald-400 bg-emerald-500/10 border-emerald-500/20",
      "phase3": "text-purple-400 bg-purple-500/10 border-purple-500/20",
      "phase4": "text-amber-400 bg-amber-500/10 border-amber-500/20"
    };

    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    function populateSidebar(activeId) {
      const nav = document.getElementById('sidebar-nav');
      nav.innerHTML = '';

      milestonesData.forEach(node => {
        const isActive = node.id === activeId;
        const phaseKey = phaseMap[node.phase];
        
        let dotColor = "bg-slate-600";
        if (phaseKey === "phase1") dotColor = "bg-blue-500";
        else if (phaseKey === "phase2") dotColor = "bg-emerald-500";
        else if (phaseKey === "phase3") dotColor = "bg-purple-500";
        else if (phaseKey === "phase4") dotColor = "bg-amber-500";

        const link = document.createElement('a');
        link.href = `milestone.html?id=${node.id}`;
        link.className = `flex items-center space-x-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 ${
          isActive 
            ? 'bg-brand-500/10 text-brand-400 border border-brand-500/20 font-bold' 
            : 'text-slate-400 hover:bg-slate-900 hover:text-slate-200 border border-transparent'
        }`;

        link.innerHTML = `
          <span class="w-5 h-5 rounded-md bg-slate-950 border border-slate-800 flex items-center justify-center text-xs font-mono font-bold ${isActive ? 'text-brand-400' : 'text-slate-500'}">
            ${node.number}
          </span>
          <span class="truncate flex-1 text-left">${node.title.split('：')[0]}</span>
          <span class="w-1.5 h-1.5 rounded-full ${dotColor}"></span>
        `;
        nav.appendChild(link);
      });
    }

    function renderMilestoneDetails() {
      const id = getQueryParam('id') || milestonesData[0].id;
      const nodeIndex = milestonesData.findIndex(n => n.id === id);
      
      if (nodeIndex === -1) {
        document.getElementById('loading-state').innerHTML = `
          <p class="text-red-400 font-bold">未找到该节点数据！</p>
          <a href="index.html" class="text-brand-400 hover:underline">返回首页</a>
        `;
        return;
      }

      const node = milestonesData[nodeIndex];
      const phaseKey = phaseMap[node.phase];

      // Populate Sidebar
      populateSidebar(node.id);

      // Header node info
      document.getElementById('header-node-info').innerHTML = `
        <span class="font-mono font-bold text-brand-400">${node.number}</span>
        <span class="text-slate-500">/</span>
        <span class="text-slate-300 font-semibold">${node.title.split('：')[0]}</span>
      `;

      // Title & Phase Banner
      document.getElementById('node-phase').innerText = node.phase;
      document.getElementById('node-phase').className = `px-3 py-1 rounded-full text-xs font-bold border ${phaseStyles[phaseKey]}`;
      document.getElementById('node-date').innerText = node.date;
      document.getElementById('node-title').innerHTML = `
        <span class="font-mono text-brand-500 mr-2">${node.number}.</span>${node.title}
      `;
      document.getElementById('node-summary').innerText = node.summary;

      // Links
      const linksContainer = document.getElementById('node-links');
      linksContainer.innerHTML = '';
      if (node.paper) {
        linksContainer.innerHTML += `
          <a href="${node.paper.url}" target="_blank" class="inline-flex items-center space-x-1.5 text-xs font-bold text-blue-400 hover:text-blue-300 transition-colors bg-blue-500/5 border border-blue-500/10 px-3 py-1.5 rounded-lg">
            <span>📄 论文: ${node.paper.title}</span>
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
            </svg>
          </a>
        `;
      }
      if (node.repo) {
        linksContainer.innerHTML += `
          <a href="${node.repo.url}" target="_blank" class="inline-flex items-center space-x-1.5 text-xs font-bold text-emerald-400 hover:text-emerald-300 transition-colors bg-emerald-500/5 border border-emerald-500/10 px-3 py-1.5 rounded-lg">
            <span>💻 开源仓库: ${node.repo.name}</span>
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
            </svg>
          </a>
        `;
      }

      // Image
      document.getElementById('node-image').src = node.image;
      document.getElementById('node-image').alt = node.title;

      // Core Architecture
      const archContainer = document.getElementById('node-architecture');
      archContainer.innerHTML = '';
      node.architecture.forEach((arch, index) => {
        const archCard = document.createElement('div');
        archCard.className = "bg-slate-950/40 border border-slate-800/80 rounded-2xl p-6 hover:border-slate-700 transition-all duration-300";
        archCard.innerHTML = `
          <div class="flex items-center space-x-3 mb-3">
            <span class="w-7 h-7 rounded-lg bg-brand-500/10 text-brand-400 border border-brand-500/20 flex items-center justify-center font-mono font-bold text-sm">
              ${index + 1}
            </span>
            <h3 class="text-base font-bold text-white">${arch.title}</h3>
          </div>
          <p class="text-sm text-slate-400 leading-relaxed">${arch.desc}</p>
        `;
        archContainer.appendChild(archCard);
      });

      // Key Contributions
      const contribContainer = document.getElementById('node-contributions');
      contribContainer.innerHTML = '';
      node.contributions.forEach(contrib => {
        const li = document.createElement('li');
        li.className = "flex items-start space-x-3";
        li.innerHTML = `
          <span class="text-brand-400 mt-1">✦</span>
          <span class="text-sm leading-relaxed">${contrib}</span>
        `;
        contribContainer.appendChild(li);
      });

      // Prev & Next Buttons
      const prevBtn = document.getElementById('prev-node-btn');
      const nextBtn = document.getElementById('next-node-btn');

      if (nodeIndex > 0) {
        prevBtn.href = `milestone.html?id=${milestonesData[nodeIndex - 1].id}`;
        prevBtn.style.visibility = 'visible';
      } else {
        prevBtn.style.visibility = 'hidden';
      }

      if (nodeIndex < milestonesData.length - 1) {
        nextBtn.href = `milestone.html?id=${milestonesData[nodeIndex + 1].id}`;
        nextBtn.style.visibility = 'visible';
      } else {
        nextBtn.style.visibility = 'hidden';
      }

      // Show content and hide loading
      document.getElementById('loading-state').className = "hidden";
      document.getElementById('node-content').className = "space-y-8";
    }

    window.onload = () => {
      renderMilestoneDetails();
    };
  </script>
</body>
</html>
